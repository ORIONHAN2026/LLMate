# Hexo Configuration
title: LLMWork
subtitle: '智能AI工作台 | 多模型一键切换 · 工作模式智能导航'
description: '支持8+主流大模型API一键切换，内置多种工作模式与智能导航台——合同模式下自动生成合同概要、履约记录、争议条款，让AI真正成为你的生产力伙伴。'
keywords:
  - AI助手
  - LLMWork
  - LLM
  - 大模型切换
  - 工作模式
  - 智能导航
  - 合同模式
  - AI工作台
author: LLMWork Team
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: https://kaiiiz.github.io/hexo-theme-book-demo/
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Theme
theme: book

# Deployment
deploy:
  type: ''
