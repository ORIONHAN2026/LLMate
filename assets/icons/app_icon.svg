<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1aad19;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#07C160;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>
  
  <!-- 圆角背景 -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#greenGradient)" filter="url(#shadow)"/>
  
  <!-- 聊天气泡 -->
  <g transform="translate(512, 512)">
    <!-- 主聊天气泡 -->
    <ellipse cx="0" cy="-40" rx="280" ry="200" fill="white" opacity="0.95"/>
    
    <!-- 聊天气泡尾巴 -->
    <path d="M -200 80 Q -220 120 -180 140 Q -160 130 -180 100" fill="white" opacity="0.95"/>
    
    <!-- 装饰点 -->
    <circle cx="-80" cy="-60" r="12" fill="#07C160"/>
    <circle cx="0" cy="-60" r="12" fill="#07C160"/>
    <circle cx="80" cy="-60" r="12" fill="#07C160"/>
  </g>
</svg>
