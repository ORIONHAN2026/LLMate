# 云托管配置 - llmwork_wechatpublic 微信公众号 MCP 服务

service:
  name: llmwork-wechatpublic
  port: 80

environment:
  - name: PORT
    value: "80"
  - name: HOST
    value: "0.0.0.0"
  - name: TCB_TOKEN
    value: "your_tcb_token_here"
  - name: API_BASE
    value: "https://cloud1-1gqqkl7s9ff46343.api.tcloudbasegateway.com"
  - name: CLOUD_FUNCTION_NAME
    value: "llmwork_wechatpublic"

healthCheck:
  httpGet:
    path: /health
    port: 80
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /health
    port: 80
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
